[env:nanoatmega328]
platform = atmelavr
board = nanoatmega328
framework = arduino
monitor_speed = 115200

; If your Nano uses the "new" bootloader, switch board to `nanoatmega328new`.
lib_deps =
	Servo
	MPU6050_tockn
	ezLED
	OneButton
build_flags = -I.

[env:unit]
platform = native
board = native_custom
build_flags = -Isrc
